<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <div class="d-flex justify-content-center">
        <img class="pokemon-logo" src="./International_Pokémon_logo.svg (1).png" alt="">
    </div>
    <div class="d-flex justify-content-center gap-3 mt-4">
        <input id="search" class="form-control w-25" placeholder="Search Pokemon...">

        <select id="filter" class="form-select w-25">
            <option value="all">All</option>
            <option value="Fire">Fire</option>
            <option value="Water">Water</option>
            <option value="Grass">Grass</option>
            <option value="Electric">Electric</option>
            <option value="Poison">Poison</option>
            <option value="Bug">Bug</option>
        </select>
    </div>
    <div class="container">
        <ul
            class="js-list d-flex list-unstyled gap-5 flex-wrap text-center justify-content-center mt-5 mb-5 ml-auto mr-auto">
        </ul>
    </div>
    <script src="./pokemons.js"></script>
</body>

</html>
